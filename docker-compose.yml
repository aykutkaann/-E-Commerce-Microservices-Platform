version: '3.8'

networks:
  ecommerce-network:
    driver: bridge

  
services:

  product-service:
    build:
      context: ./src/ProductService
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "5001:8080"
    networks:
      - ecommerce-network
    environment:
      - ASPNETCOTE_ENVIRONMENT=development
    healthcheck:
       test: ["CMD", "curl", "-f", "http://localhost:8080/swagger"]
       interval: 30s
       timeout: 10s
       retries: 3


  order-service:
    build:
      context: ./src/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "5002:8080"
    networks:
      - ecommerce-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ProductServiceUrl=http://product-service:8080
    depends_on:
      - product-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger"]
      interval: 30s
      timeout: 10s
      retries: 3

  
  user-service:
    build:
      context: ./src/UserService
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5003:8080"
    networks:
      - ecommerce-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger"]
      interval: 30s
      timeout: 10s
      retries: 3

