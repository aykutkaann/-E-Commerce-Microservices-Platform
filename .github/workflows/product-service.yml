name: Product Service CI/CD

# when to run?
on:
  push:
    branches:
      - main
    paths:
      - 'src/ProductService/**'   
      - '.github/workflows/product-service.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/ProductService/**'

env:
  IMAGE_NAME: product-service

jobs:
  # JOB 1: Build & Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Pull the code
        uses: actions/checkout@v4

      - name: setup .NET 10 
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Upload the dependencies
        run: dotnet restore src/ProductService/ProductService.csproj

      - name: Build 
        run: dotnet build src/ProductService/ProductService.csproj
          --no-restore
          --configuration Release

      - name: Run tests
        run: dotnet test src/ProductService/ProductService.csproj
          --no-build
          --configuration Release
          --verbosity normal

  # JOB 2: Docker Build & Push
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test          
    if: github.ref == 'refs/heads/main'   

    steps:
      - name: Pull the code
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image 
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            src/ProductService/

      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # JOB 3: AKS Deploy
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: docker-build-push       
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Pull the code
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Take AKS credentials 
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/product-service \
            product-service=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Controll if deployy is successfull
        run: |
          kubectl rollout status deployment/product-service \
            --timeout=300s